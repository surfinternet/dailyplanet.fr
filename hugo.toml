baseURL = "https://dailyplanet.fr/"
locale = "fr-FR"
title = "Daily Planet"
paginate = 10
enableRobotsTXT = true
enableEmoji = false
defaultContentLanguage = "fr"

[params]
  description   = "L'IA et la tech qui comptent, sans la langue de bois."
  tagline       = "L'IA et la tech qui comptent, sans la langue de bois."
  author        = "Rédaction Daily Planet"
  twitterHandle = "@DailyPlanetFR"
  twitterURL    = "https://x.com/DailyPlanetFR"
  linkedinURL   = "https://linkedin.com/company/dailyplanetfr"
  rssURL        = "/index.xml"

[permalinks]
  posts = "/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false
  [markup.highlight]
    noClasses = false

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]

[minify]
  minifyOutput = true

[imaging]
  quality = 75
  resampleFilter = "Lanczos"
  [imaging.exif]
    disableDate     = false
    disableLatLong  = true

[menu]
  [[menu.main]]
    name   = "Actualités"
    url    = "/posts/"
    weight = 1

  [[menu.footer]]
    name   = "À propos"
    url    = "/about/"
    weight = 1
  [[menu.footer]]
    name   = "Mentions légales"
    url    = "/mentions-legales/"
    weight = 2
  [[menu.footer]]
    name   = "Contact"
    url    = "/contact/"
    weight = 3

