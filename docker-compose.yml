services:
  dailyplanet-pipeline:
    build: .
    container_name: dailyplanet-pipeline
    restart: unless-stopped
    volumes:
      # Repo complet monté en live — inclut .git pour que le container puisse faire git push
      - /home/dailyplanet/dailyplanet.fr:/app
      # Clés SSH pour authentification GitHub (lecture seule)
      - /home/dailyplanet/.ssh:/root/.ssh:ro
    env_file:
      - /home/dailyplanet/dailyplanet.fr/.env
    environment:
      - TZ=Europe/Paris
