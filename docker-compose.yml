services:
  dailyplanet-pipeline:
    build: .
    container_name: dailyplanet-pipeline
    restart: unless-stopped
    volumes:
      # Repo complet en live — inclut .git pour que le container puisse faire git push
      - /home/dailyplanet/dailyplanet.fr:/app
      # Clés SSH montées sur /host-ssh (lu par entrypoint, copié dans /root/.ssh avec bons droits)
      - /home/dailyplanet/.ssh:/host-ssh:ro
    env_file:
      - /home/dailyplanet/dailyplanet.fr/.env
    environment:
      - TZ=Europe/Paris
